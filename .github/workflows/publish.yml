name: Publish to PyPI
on:
  push:
    tags: ["v*"]
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install build
      - run: python -m build
      - name: Check sdist for secrets
        run: |
          tar tf dist/sportagent-*.tar.gz | grep -E "\.env$|\.pem$|secrets/" && exit 1 || echo "NO_SECRETS_IN_SDIST_GOOD"
      - uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing (OIDC) — configure at
        # https://pypi.org/manage/project/sportagent/settings/publishing/
        # Alternatively set the PYPI_API_TOKEN repo secret and use:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}